  email = "mailto:konen93@gmail.com"
  instagram = "https://www.instagram.com/hercules._.o7l6/"
  facebook = "https://www.facebook.com/Konentung"
  threads = "https://www.threads.com/@hercules._.o7l6/"
  linkedin = "https://www.linkedin.com/in/konentung/"
  stackoverflow = "https://stackoverflow.com/users/23608210/konentung?tab=profile"

