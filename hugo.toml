  heroTitle = "Hello, I'm Konen"
  heroSubtitle = "A developer who loves building things for the web."
  footerText = "Built with Hugo & hugo-theme-drift."
  siteStartYear = 2025
  # avatar = "/img/avatar.jpg"
  showTableOfContents = true
  showShareButtons = true
  # utterancesRepo = "konentung/blog-comments"

[params.social]
  github = "https://github.com/konentung"
  twitter = "https://x.com/Konentung"
